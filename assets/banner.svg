<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="50%" style="stop-color:#f5576c"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#f5576c;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="240" cy="100" r="250" fill="url(#orb1)"/>
  <circle cx="960" cy="200" r="250" fill="url(#orb2)"/>
  <circle cx="600" cy="150" r="200" fill="url(#orb3)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="300" fill="url(#dots)"/>
  </g>

  <!-- Decorative line -->
  <rect x="360" y="185" width="480" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Main icon - stylized "AI" + star burst -->
  <g transform="translate(100, 30)">
    <!-- Subtle ring -->
    <circle cx="110" cy="120" r="90" stroke="url(#accent)" stroke-width="0.5" fill="none" opacity="0.3"/>
    <circle cx="110" cy="120" r="80" stroke="url(#accent)" stroke-width="0.3" fill="none" opacity="0.2"/>
    <circle cx="110" cy="120" r="70" stroke="url(#accent)" stroke-width="0.3" fill="none" opacity="0.15"/>

    <!-- Star/sparkle icon -->
    <g transform="translate(110,95)" filter="url(#glow)">
      <path d="M0 -45 L10 -12 L45 -12 L16 8 L28 42 L0 20 L-28 42 L-16 8 L-45 -12 L-10 -12 Z"
            fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.8"/>
    </g>

    <!-- Small sparkles -->
    <circle cx="50" cy="60" r="2" fill="#4facfe" opacity="0.5"/>
    <circle cx="170" cy="50" r="1.5" fill="#f093fb" opacity="0.6"/>
    <circle cx="180" cy="180" r="1.5" fill="#f5576c" opacity="0.4"/>
    <circle cx="40" cy="170" r="1" fill="#a18cd1" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="350" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="2">
    Full<tspan fill="url(#text-grad)">AIGC</tspan>Skills
  </text>

  <!-- Subtitle -->
  <text x="355" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#a0a0b8" letter-spacing="1">
    面向 AI Coding Agent 的全栈 AIGC 技能生态
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="300" fill="#606080" text-anchor="middle" letter-spacing="3">
    SKILLS 标准化封装 · 跨平台发现与复用 · 提示工程
  </text>

  <!-- Small decorative shapes -->
  <g opacity="0.3">
    <rect x="350" y="260" width="4" height="4" rx="1" fill="#4facfe"/>
    <rect x="360" y="260" width="4" height="4" rx="1" fill="#f093fb"/>
    <rect x="370" y="260" width="4" height="4" rx="1" fill="#f5576c"/>
    <rect x="380" y="260" width="4" height="4" rx="1" fill="#a18cd1"/>
  </g>
</svg>
