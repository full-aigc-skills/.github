name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the template below so we can reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. 0.5.0 (commit abc1234)"
      description: The version / commit SHA where the bug occurred
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did the bug appear?
      options:
        - Local development
        - CI / build server
        - Production
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Bug Summary
      placeholder: "One-line description of the bug"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run command X
        2. Call API Y with payload Z
        3. Observe: ...
      description: Minimal reproduction — code snippet, command, or test case
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "What you expected to happen"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: "What actually happened — include stack trace, error message, etc."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: |
        - OS / runtime version
        - Related issues
        - Screenshots / logs
        - Workaround (if any)