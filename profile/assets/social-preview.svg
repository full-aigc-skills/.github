<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Full-AIGC-Skills social preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#1e1b4b"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Media-type icons (right) -->
  <g transform="translate(900, 180)" opacity="0.30">
    <!-- Text bubble -->
    <rect x="0" y="0" width="80" height="60" rx="8" fill="#3b82f6"/>
    <text x="40" y="40" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">TXT</text>
    <!-- Image -->
    <rect x="100" y="-20" width="80" height="60" rx="8" fill="#8b5cf6"/>
    <text x="140" y="20" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">IMG</text>
    <!-- Audio -->
    <rect x="200" y="20" width="80" height="60" rx="8" fill="#ec4899"/>
    <text x="240" y="60" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">AUD</text>
    <!-- Video -->
    <rect x="50" y="100" width="80" height="60" rx="8" fill="#ef4444"/>
    <text x="90" y="140" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">VID</text>
    <!-- 3D -->
    <rect x="160" y="120" width="80" height="60" rx="8" fill="#10b981"/>
    <text x="200" y="160" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">3D</text>
  </g>

  <!-- Title -->
  <text x="100" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="100" font-weight="800" fill="url(#title)" letter-spacing="-3">Full-AIGC-Skills</text>

  <!-- Subtitle -->
  <text x="104" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="30" font-weight="400" fill="#e9d5ff" letter-spacing="0.5">
    Multi-platform AIGC content generation skills for AI Agents
  </text>

  <!-- Tagline -->
  <text x="104" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="300" fill="#c084fc" letter-spacing="2">
    Text · Image · Audio · Video · 3D · Multimodal
  </text>

  <!-- Partme-AI badge -->
  <g transform="translate(104, 460)">
    <rect x="0" y="0" width="320" height="50" rx="25" fill="#6366f1"/>
    <text x="160" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">
      Part of partme-ai ecosystem
    </text>
  </g>

  <rect x="0" y="628" width="1280" height="12" fill="url(#title)"/>
</svg>